name: aurganize_lyf
description: A daily-life planner and supportive enforcer.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- Routing ---
  go_router: ^14.2.0

  # --- Local persistence ---
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # --- Models / serialization ---
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  collection: ^1.18.0

  # --- HTTP / API ---
  dio: ^5.5.0+1
  pretty_dio_logger: ^1.4.0

  # --- Notifications ---
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # --- Voice ---
  speech_to_text: ^6.6.2

  # --- UI helpers ---
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: 0.20.2

  # --- Utilities ---
  shared_preferences: ^2.2.3
  logging: ^1.2.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/